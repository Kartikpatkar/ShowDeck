<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181A34"/>
      <stop offset="100%" stop-color="#101225"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="45%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
    <linearGradient id="cardBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- full-bleed background, no rounding (maskable safe) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- back card (peeking left) -->
  <rect x="120" y="128" width="180" height="256" rx="26" fill="url(#cardBack)" opacity="0.9"/>

  <!-- front card -->
  <rect x="152" y="120" width="240" height="272" rx="30" fill="url(#card)"/>

  <!-- film-strip dots on right edge of front card -->
  <g fill="#0F1220" opacity="0.55">
    <circle cx="366" cy="160" r="9"/>
    <circle cx="366" cy="200" r="9"/>
    <circle cx="366" cy="240" r="9"/>
    <circle cx="366" cy="280" r="9"/>
    <circle cx="366" cy="320" r="9"/>
    <circle cx="366" cy="360" r="9"/>
  </g>

  <!-- play triangle -->
  <path d="M232 190 L232 322 L340 256 Z" fill="#FFFFFF"/>
</svg>
